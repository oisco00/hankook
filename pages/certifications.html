<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>인증현황</title>
  <link rel="stylesheet" href="../assets/css/page.css">
</head>
<body>
  <div class="page">
<section class="section-head">
  <div><span class="kicker">CERTIFICATIONS</span><h3>인증서 보유 현황</h3></div>
  <p>자동차 부품 산업에서 요구되는 품질 및 고객사 인증을 별도 페이지에서 명확하게 제시합니다.</p>
</section>
<div class="grid-3">
  <article class="card cert-card"><img src="../assets/images/cert_iatf.png" alt="IATF16949 인증"><div class="gallery-body"><h4>IATF16949 인증</h4><p>자동차 산업 품질경영 시스템 인증</p></div></article>
  <article class="card cert-card"><img src="../assets/images/cert_msq.png" alt="현대모비스 MSQ 인증"><div class="gallery-body"><h4>현대모비스 MSQ 인증</h4><p>고객사 요구 품질체계 대응</p></div></article>
  <article class="card cert-card"><img src="../assets/images/cert_tsq.png" alt="현대트랜시스 TSQ 인증"><div class="gallery-body"><h4>현대트랜시스 TSQ 인증</h4><p>고객 신뢰 기반의 공급 품질 체계</p></div></article>
</div>
<section class="section card pad">
  <div class="grid-3">
    <div class="metric"><strong>IATF</strong><span>글로벌 품질경영 시스템</span></div>
    <div class="metric"><strong>MSQ</strong><span>현대모비스 인증</span></div>
    <div class="metric"><strong>TSQ</strong><span>현대트랜시스 인증</span></div>
  </div>
</section>
</div>
</body>
</html>
